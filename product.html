<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Product — NexMart</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    .pd-wrap { max-width:1400px; margin:0 auto; padding:3rem 2rem; display:grid; grid-template-columns:1fr 1fr; gap:4rem; align-items:start; }
    .pd-gallery { position:sticky; top:80px; }
    .pd-main-img { background:var(--white); border:1px solid var(--border); border-radius:var(--radius); height:420px; display:flex; align-items:center; justify-content:center; font-size:9rem; margin-bottom:1rem; cursor:zoom-in; transition:transform var(--t); }
    .pd-main-img:hover { transform:scale(1.02); }
    .pd-thumbs { display:flex; gap:.6rem; }
    .pd-thumb { width:80px; height:80px; background:var(--bg); border:2px solid var(--border); border-radius:var(--radius-sm); display:flex; align-items:center; justify-content:center; font-size:2rem; cursor:pointer; transition:border-color var(--t); }
    .pd-thumb.active,.pd-thumb:hover { border-color:var(--navy); }
    .pd-info { display:flex; flex-direction:column; gap:1.1rem; }
    .pd-cat { font-size:.75rem; color:var(--gold); font-weight:700; text-transform:uppercase; letter-spacing:.1em; }
    .pd-name { font-family:var(--font-head); font-size:2.5rem; font-weight:700; line-height:1.15; }
    .pd-rating-row { display:flex; align-items:center; gap:1rem; }
    .pd-stars { color:#f4a261; font-size:1.1rem; }
    .pd-reviews { font-size:.875rem; color:var(--text-lt); }
    .pd-price-row { display:flex; align-items:baseline; gap:.75rem; }
    .pd-price { font-family:var(--font-head); font-size:2.2rem; font-weight:700; color:var(--navy); }
    .pd-old { font-size:1.1rem; color:var(--text-lt); text-decoration:line-through; }
    .pd-discount { background:#fdecea; color:var(--danger); border-radius:99px; padding:.2rem .7rem; font-size:.78rem; font-weight:700; }
    .pd-desc { color:var(--text-md); font-size:.925rem; line-height:1.75; }
    .pd-options label { font-size:.78rem; font-weight:700; color:var(--text-md); text-transform:uppercase; letter-spacing:.06em; display:block; margin-bottom:.5rem; }
    .size-btns { display:flex; gap:.5rem; flex-wrap:wrap; }
    .size-btn { padding:.45rem 1rem; border:1.5px solid var(--border); border-radius:var(--radius-sm); background:var(--white); font-family:var(--font-body); font-size:.82rem; font-weight:600; cursor:pointer; transition:all var(--t); }
    .size-btn:hover,.size-btn.active { background:var(--navy); color:#fff; border-color:var(--navy); }
    .pd-qty-row { display:flex; align-items:center; gap:1.5rem; }
    .pd-qty-ctrl { display:flex; align-items:center; border:1.5px solid var(--border); border-radius:var(--radius-sm); overflow:hidden; }
    .pd-qty-ctrl button { width:40px; height:40px; background:var(--bg); border:none; font-size:1.1rem; font-weight:700; cursor:pointer; transition:background var(--t); }
    .pd-qty-ctrl button:hover { background:var(--navy); color:#fff; }
    .pd-qty-ctrl span { width:44px; text-align:center; font-weight:700; font-size:1rem; border-left:1px solid var(--border); border-right:1px solid var(--border); line-height:40px; }
    .pd-cta { display:flex; gap:1rem; flex-wrap:wrap; }
    .pd-meta { background:var(--bg); border-radius:var(--radius-sm); padding:1rem 1.25rem; display:grid; grid-template-columns:1fr 1fr; gap:.5rem; }
    .pm-row { display:flex; align-items:center; gap:.5rem; font-size:.82rem; color:var(--text-md); }
    .pm-row i { color:var(--gold); width:16px; }
    .pd-tabs { border-bottom:1px solid var(--border); display:flex; gap:0; margin-top:2rem; }
    .pd-tab { padding:.75rem 1.25rem; border:none; background:transparent; font-family:var(--font-body); font-size:.875rem; font-weight:600; color:var(--text-lt); cursor:pointer; border-bottom:2px solid transparent; transition:all var(--t); }
    .pd-tab.active { color:var(--navy); border-bottom-color:var(--navy); }
    .pd-tab-body { padding:1.5rem 0; display:none; }
    .pd-tab-body.active { display:block; }
    .nutrition-table td,.nutrition-table th { padding:.5rem .75rem; font-size:.82rem; }
    .review-card { padding:1.25rem; border:1px solid var(--border); border-radius:var(--radius-sm); margin-bottom:.75rem; background:var(--white); }
    .rv-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:.5rem; }
    .rv-author { font-weight:600; font-size:.875rem; }
    .rv-date { font-size:.75rem; color:var(--text-lt); }
    .rv-stars { color:#f4a261; font-size:.9rem; margin-bottom:.4rem; }
    .rv-text { font-size:.875rem; color:var(--text-md); line-height:1.65; }
    .related-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:1rem; margin-top:1.5rem; }
    @media(max-width:900px){ .pd-wrap{grid-template-columns:1fr;gap:2rem} .pd-gallery{position:static} }
  </style>
</head>
<body>
<script src="app.js"></script>
<script>buildNav(); buildCartDrawer();</script>

<div class="page-hero">
  <div class="page-hero-inner">
    <div class="breadcrumb">
      <a href="index.html">Home</a><span>/</span>
      <a href="index.html#products">Products</a><span>/</span>
      <span id="bcCat">Category</span><span>/</span>
      <span id="bcName">Product</span>
    </div>
    <h1 id="phName">Product Details</h1>
    <p id="phCat"></p>
  </div>
</div>

<div class="pd-wrap">
  <!-- Gallery -->
  <div class="pd-gallery">
    <div class="pd-main-img" id="mainImg">🛒</div>
    <div class="pd-thumbs" id="thumbsRow"></div>
  </div>

  <!-- Info -->
  <div class="pd-info">
    <div class="pd-cat" id="pdCat"></div>
    <h1 class="pd-name" id="pdName"></h1>
    <div class="pd-rating-row">
      <span class="pd-stars" id="pdStars"></span>
      <span id="pdRating"></span>
      <span class="pd-reviews" id="pdReviews"></span>
    </div>

    <div class="pd-price-row">
      <div class="pd-price" id="pdPrice"></div>
      <div class="pd-old" id="pdOld"></div>
      <div class="pd-discount" id="pdDisc" style="display:none"></div>
    </div>

    <p class="pd-desc" id="pdDesc"></p>

    <div class="pd-options">
      <label>Pack Size</label>
      <div class="size-btns" id="sizeBtns"></div>
    </div>

    <div class="pd-qty-row">
      <div>
        <div style="font-size:.78rem;font-weight:700;color:var(--text-md);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.4rem">Quantity</div>
        <div class="pd-qty-ctrl">
          <button onclick="changeLocal(-1)">−</button>
          <span id="localQty">1</span>
          <button onclick="changeLocal(1)">+</button>
        </div>
      </div>
      <div style="background:var(--bg);border-radius:var(--radius-sm);padding:.5rem 1rem;font-size:.82rem;color:var(--success)">
        <i class="fa fa-check-circle"></i> In Stock
      </div>
    </div>

    <div class="pd-cta">
      <button class="btn btn-navy btn-lg" id="addBtn" onclick="addThisToCart()">
        <i class="fa fa-shopping-bag"></i> Add to Cart
      </button>
      <button class="btn btn-gold btn-lg" onclick="location.href='checkout.html'">
        <i class="fa fa-bolt"></i> Buy Now
      </button>
      <button class="btn btn-ghost btn-icon btn-lg" id="wishBtn" onclick="toggleThisWish()">
        <i class="far fa-heart"></i>
      </button>
    </div>

    <div class="pd-meta">
      <div class="pm-row"><i class="fa fa-truck"></i> Free delivery above ₹499</div>
      <div class="pm-row"><i class="fa fa-shield-alt"></i> Quality guaranteed</div>
      <div class="pm-row"><i class="fa fa-leaf"></i> Farm fresh sourced</div>
      <div class="pm-row"><i class="fa fa-undo"></i> Easy 24-hr returns</div>
    </div>

    <!-- Tabs -->
    <div class="pd-tabs">
      <button class="pd-tab active" onclick="switchPdTab('desc',this)">Description</button>
      <button class="pd-tab" onclick="switchPdTab('nutrition',this)">Nutrition</button>
      <button class="pd-tab" onclick="switchPdTab('reviews',this)">Reviews</button>
    </div>

    <div class="pd-tab-body active" id="tab-desc">
      <p style="color:var(--text-md);line-height:1.8;font-size:.9rem" id="tabDesc"></p>
    </div>
    <div class="pd-tab-body" id="tab-nutrition">
      <table class="nutrition-table" style="width:100%;border-collapse:collapse">
        <thead><tr><th style="text-align:left;padding:.5rem .75rem;background:var(--bg);font-size:.78rem;text-transform:uppercase;letter-spacing:.06em">Nutrient</th><th style="text-align:left;padding:.5rem .75rem;background:var(--bg);font-size:.78rem;text-transform:uppercase;letter-spacing:.06em">Per 100g</th></tr></thead>
        <tbody id="nutritionBody"></tbody>
      </table>
    </div>
    <div class="pd-tab-body" id="tab-reviews">
      <div id="reviewsList"></div>
    </div>
  </div>
</div>

<!-- Related Products -->
<div class="section" style="background:var(--bg2);padding-top:2rem">
  <div class="section-head"><div><div class="section-title">You May Also <em>Like</em></div></div></div>
  <div class="related-grid" id="relatedGrid"></div>
</div>

<script>
  buildFooter();

  const params = new URLSearchParams(location.search);
  const id = parseInt(params.get('id')) || 1;
  const product = PRODUCTS.find(p => p.id === id) || PRODUCTS[0];

  let localQty = 1;
  function changeLocal(d) { localQty = Math.max(1, localQty + d); document.getElementById('localQty').textContent = localQty; }

  function addThisToCart() {
    for (let i = 0; i < localQty; i++) Store.addToCart(product.id);
    updateCartUI();
    toast(`${product.emoji} ${product.name} ×${localQty} added to cart`);
  }

  function toggleThisWish() {
    Store.toggleWish(product.id);
    const inW = Store.wishlist.includes(product.id);
    document.getElementById('wishBtn').innerHTML = `<i class="${inW?'fas':'far'} fa-heart" style="color:${inW?'#e63946':''}"></i>`;
    toast(inW ? `❤️ Saved to wishlist` : `Removed from wishlist`);
  }

  function switchPdTab(tab, btn) {
    document.querySelectorAll('.pd-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.pd-tab-body').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + tab).classList.add('active');
  }

  // Populate page
  document.title = `${product.name} — NexMart`;
  document.getElementById('bcCat').textContent  = product.cat;
  document.getElementById('bcName').textContent = product.name;
  document.getElementById('phName').textContent = product.name;
  document.getElementById('phCat').textContent  = product.cat + ' · ' + product.weight;
  document.getElementById('mainImg').textContent = product.emoji;
  document.getElementById('pdCat').textContent  = product.cat;
  document.getElementById('pdName').textContent = product.name;
  document.getElementById('pdStars').textContent = starsHTML(product.rating);
  document.getElementById('pdRating').textContent = product.rating;
  document.getElementById('pdReviews').textContent = `(${product.reviews} reviews)`;
  document.getElementById('pdPrice').textContent = fmt(product.price);
  if (product.oldPrice) {
    document.getElementById('pdOld').textContent = fmt(product.oldPrice);
    const disc = Math.round((1 - product.price/product.oldPrice)*100);
    const dd = document.getElementById('pdDisc');
    dd.textContent = `-${disc}%`; dd.style.display = '';
  }

  const descs = {
    Vegetables: `Hand-picked ${product.name.toLowerCase()} sourced directly from local farms. Delivered within hours of harvest to ensure maximum freshness and nutritional value. Rich in essential vitamins, minerals and dietary fibre — perfect for a healthy, balanced diet.`,
    Fruits: `Premium quality ${product.name.toLowerCase()} selected at peak ripeness for the best flavour and nutrition. Our fruits are sourced from trusted partner farms with zero added preservatives or chemicals.`,
    Dairy: `Fresh ${product.name.toLowerCase()} from certified farms following the highest hygiene standards. Cold-chain maintained from farm to your door for guaranteed freshness.`,
    Bakery: `Artisan-crafted ${product.name.toLowerCase()} baked fresh every morning using traditional recipes and premium ingredients. No artificial preservatives — just honest, wholesome baking.`,
    Beverages: `Premium ${product.name.toLowerCase()} made from carefully selected ingredients. No artificial colours or flavours — just pure, refreshing taste in every sip.`,
    Snacks: `Delicious ${product.name.toLowerCase()} made with high-quality ingredients for a snack you can feel good about. Perfect for any time of day.`,
    Grains: `Premium ${product.name.toLowerCase()} sourced from the finest farms. Cleaned and packaged hygienically to preserve natural goodness and aroma.`,
  };
  document.getElementById('pdDesc').textContent = descs[product.cat] || 'Premium quality product.';
  document.getElementById('tabDesc').textContent = descs[product.cat] || 'Premium quality product.';

  // Sizes
  const sizes = [product.weight, product.weight.replace(/\d+/, n => parseInt(n)*2), product.weight.replace(/\d+/, n => parseInt(n)*3)].slice(0,3);
  document.getElementById('sizeBtns').innerHTML = sizes.map((s,i) =>
    `<button class="size-btn ${i===0?'active':''}" onclick="this.parentElement.querySelectorAll('.size-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active')">${s}</button>`
  ).join('');

  // Thumbnails (same emoji for demo)
  document.getElementById('thumbsRow').innerHTML = [product.emoji,product.emoji,product.emoji].map((e,i) =>
    `<div class="pd-thumb ${i===0?'active':''}" onclick="this.parentElement.querySelectorAll('.pd-thumb').forEach(t=>t.classList.remove('active'));this.classList.add('active')">${e}</div>`
  ).join('');

  // Nutrition (generated)
  const nutritionData = [['Calories','52 kcal'],['Protein','1.2g'],['Carbohydrates','11.8g'],['Dietary Fibre','2.4g'],['Total Fat','0.3g'],['Sodium','6mg'],['Vitamin C','28mg'],['Iron','0.6mg']];
  document.getElementById('nutritionBody').innerHTML = nutritionData.map((r,i) =>
    `<tr style="background:${i%2?'var(--bg)':'var(--white)'}"><td>${r[0]}</td><td><strong>${r[1]}</strong></td></tr>`
  ).join('');

  // Reviews
  const reviewsData = [
    { name:'Priya S.', rating:5, date:'2 days ago', text:'Absolutely fresh and delivered on time. Will definitely order again! The quality is consistently excellent.' },
    { name:'Arjun K.', rating:4, date:'1 week ago', text:'Good quality overall. Packaging was secure and the product was fresh on arrival. Happy with my purchase.' },
    { name:'Meena R.', rating:5, date:'2 weeks ago', text:'Best quality I\'ve found in any online supermarket. NexMart never disappoints. Highly recommend!' },
  ];
  document.getElementById('reviewsList').innerHTML = reviewsData.map(r => `
    <div class="review-card">
      <div class="rv-header">
        <div>
          <div class="rv-author">${r.name}</div>
          <div class="rv-stars">${'★'.repeat(r.rating)}</div>
        </div>
        <div class="rv-date">${r.date}</div>
      </div>
      <div class="rv-text">${r.text}</div>
    </div>`).join('');

  // Related
  const related = PRODUCTS.filter(p => p.cat === product.cat && p.id !== product.id).slice(0,4);
  document.getElementById('relatedGrid').innerHTML = related.map((p,i) => productCardHTML(p, i*0.06)).join('');

  // Wishlist initial state
  if (Store.wishlist.includes(product.id)) {
    document.getElementById('wishBtn').innerHTML = `<i class="fas fa-heart" style="color:#e63946"></i>`;
  }
</script>
</body>
</html>
