<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Business Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Modern E-Shop</h1>
        <div class="cart-status">Items in Cart: <span id="cart-count">0</span></div>
    </header>

    <main>
        <section class="products">
            <div class="product-card">
                <h3>Product 1</h3>
                <p>Price: $25</p>
                <button onclick="addToCart('Product 1', 25)">Add to Cart</button>
            </div>
            <div class="product-card">
                <h3>Product 2</h3>
                <h>Price: $40</p>
                <button onclick="addToCart('Product 2', 40)">Add to Cart</button>
            </div>
        </section>

        <section class="cart-container">
            <h2>Your Shopping Cart</h2>
            <ul id="cart-items">
                </ul>
            <hr>
            <h3>Total: $<span id="total-price">0</span></h3>
            <button id="checkout-btn" onclick="checkout()">Checkout</button>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
